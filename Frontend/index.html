<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofa Stream - Sync & Chill</title>
    <link rel="stylesheet" href="style.css?v=1.4">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
</head>
<body>
<div class="container">
    <header>
        <h1>🛋️ Sofa Stream</h1>
    </header>

    <main>
        <div class="panel">
            <div class="form-group" style="margin-bottom: 24px;">
                <label>My User ID (Auto-generated):</label>
                <span id="userIdDisplay" style="font-weight: bold; font-family: monospace; font-size: 15px;"></span>
            </div>

            <div class="tabs-container">
                <button id="tabCreateBtn" class="tab-btn active" onclick="switchTab('create')">Create Room</button>
                <button id="tabJoinBtn" class="tab-btn" onclick="switchTab('join')">Join Room</button>
            </div>

            <div id="tabCreateContent" class="tab-content active">
                <h3>Room Name</h3>
                <input type="text" id="roomNameInput" placeholder="e.g. Movie Night" />
                <button onclick="createRoom()" class="btn-primary" style="margin-top: 4px;">Create Room</button>
            </div>

            <div id="tabJoinContent" class="tab-content">
                <h3>Room ID</h3>
                <input type="text" id="roomIdInput" placeholder="Enter Room ID here..." />
                <button onclick="joinRoom()" class="btn-secondary" style="margin-top: 4px;">Join Room</button>
            </div>

            <div id="status" class="status-badge disconnected" style="margin-top: 20px;">Disconnected</div>
        </div>

        <div id="hostControlsPanel" class="panel" style="display: none;">
            <h3>Change Video (Host Only)</h3>
            <div class="media-input-group">
                <input type="text" id="videoUrlInput" placeholder="Paste YouTube or RuTube URL here..." />
                <button onclick="changeVideo()" class="btn-danger">Load Video</button>
            </div>
        </div>

        <div id="theaterContainer">
            <div class="player-wrapper">
                <div id="youtubePlayer"></div>
                <iframe id="rutubePlayer" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;" allow="autoplay; encrypted-media" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"></iframe>
                <div id="playerShield"></div>
            </div>

            <!-- Video Chat Overlay Container -->
            <div id="videoChatOverlay" class="video-chat-overlay" style="display: none;">
                <div id="videoChatHeader" class="video-chat-header">
                    <span class="video-chat-title">🔊 Room Chat</span>
                    <div class="video-chat-header-actions">
                        <button id="btnToggleMinimize" class="btn-chat-icon" title="Toggle Minimize (Grid / Single)">👤</button>
                        <button id="btnToggleCollapse" class="btn-chat-icon" title="Collapse Completely">➖</button>
                    </div>
                </div>
                <div id="videoGrid" class="video-grid">
                    <!-- Local Stream Slot -->
                    <div class="video-slot local-slot" id="slot-local">
                        <video id="localVideo" autoplay playsinline muted></video>
                        <div class="video-label">Me (You)</div>
                        <div class="slot-controls">
                            <span id="localMicIndicator" class="mic-indicator active">🎙️</span>
                            <span id="localVideoIndicator" class="video-indicator active">📷</span>
                        </div>
                    </div>
                    <!-- Dynamically populated remote stream slots will go here -->
                </div>
                <div class="video-chat-controls">
                    <button id="btnToggleAudio" class="btn-chat-control" title="Toggle Audio">🎤 Mute</button>
                    <button id="btnToggleVideo" class="btn-chat-control" title="Toggle Video">📷 Disable</button>
                </div>
            </div>

            <!-- Restore Toggle Button when collapsed completely -->
            <button id="videoChatRestoreBtn" class="video-chat-restore-btn" style="display: none;" title="Restore Video Chat">
                💬 Room Chat
            </button>

            <div class="panel custom-controls-panel">
                <input type="range" id="customProgressBar" min="0" max="100" value="0" />

                <div class="controls-buttons-row">
                    <button id="customPlayBtn" class="btn-control btn-play" disabled>▶ Play</button>
                    <button id="customPauseBtn" class="btn-control btn-pause" disabled>⏸ Pause</button>
                    <span id="customTimeLabel">00:00 / 00:00</span>

                    <button id="customFullscreenBtn" class="btn-control btn-secondary" style="padding: 10px 14px; margin-left: 10px;">⛶</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="app.js?v=1.4"></script>
</body>
</html>
