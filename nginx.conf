server {
    # ВАЖНО: привязываем Nginx строго к IP домена на порт 443
    listen 89.208.106.67:443 ssl;

    server_name sofastream.ru www.sofastream.ru;

    ssl_certificate /etc/letsencrypt/live/sofastream.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sofastream.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # Security Headers & Hardening
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.youtube.com https://s.ytimg.com; frame-src 'self' https://www.youtube.com https://rutube.ru; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss://sofastream.ru;" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # 1. Раздача фронтенда Sofa Stream
    location / {
        root /var/www/sofa-stream/Frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Проксирование API в Docker
    location /api/ {
        proxy_pass http://localhost:5063;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Keep-Alive";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Проксирование Веб-сокетов SignalR
    location /hubs/ {
        proxy_pass http://localhost:5063;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 100s;
    }
}

# Редирект с HTTP (80) на HTTPS (443)
server {
    listen 89.208.106.67:80;
    server_name sofastream.ru www.sofastream.ru;
    return 301 https://$host$request_uri;
}